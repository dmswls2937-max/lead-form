<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신청 정보 입력</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p.desc {
      margin: 0 0 24px;
      color: #666;
      line-height: 1.5;
    }
    .field {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input, select, button {
      width: 100%;
      border: 1px solid #d7dce5;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4c7cf3;
      box-shadow: 0 0 0 3px rgba(76,124,243,0.15);
    }
    button {
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
      margin-top: 6px;
    }
    button:hover {
      background: #1d4ed8;
    }
    button:disabled {
      background: #9db5f7;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }
    .msg.ok { color: #0f7a34; }
    .msg.error { color: #b42318; }
    .help {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      background: #f8fafc;
      color: #475467;
      font-size: 13px;
      line-height: 1.6;
    }
    code {
      background: #eef2ff;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>정보 입력 폼</h1>
      <p class="desc">이름, 전화번호, 성별, 생년월일을 입력하면 Google Apps Script 웹앱으로 전송됩니다.</p>

      <form id="leadForm">
        <div class="field">
          <label for="name">이름</label>
          <input id="name" name="name" type="text" placeholder="홍길동" required />
        </div>

        <div class="field">
          <label for="phone">전화번호</label>
          <input id="phone" name="phone" type="tel" placeholder="01012345678" required />
        </div>

        <div class="field">
          <label for="gender">성별</label>
          <select id="gender" name="gender" required>
            <option value="">선택</option>
            <option value="남성">남성</option>
            <option value="여성">여성</option>
          </select>
        </div>

        <div class="field">
          <label for="birth">생년월일</label>
          <input id="birth" name="birth" type="date" required />
        </div>

        <button id="submitBtn" type="submit">제출하기</button>
      </form>

      <div id="message" class="msg"></div>

      <div class="help">
        사용 전 수정할 부분: HTML 안의 <code>YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL</code> 값을
        본인 Google Apps Script 웹앱 주소로 바꿔야 합니다.
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-viGTEckJChgb9VlUGr5my_vTXDgTxVk07Nz8eh_rYObTU_UjjPANQsoXteTKr-R9/exec';

    const form = document.getElementById('leadForm');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    const setMessage = (text, type) => {
      message.textContent = text;
      message.className = 'msg ' + type;
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
        setMessage('먼저 HTML 파일 안의 GOOGLE_SCRIPT_URL 값을 실제 Apps Script 웹앱 주소로 바꿔주세요.', 'error');
        return;
      }

      const formData = new FormData(form);
      const payload = {
        name: formData.get('name'),
        phone: formData.get('phone'),
        gender: formData.get('gender'),
        birth: formData.get('birth')
      };

      try {
        submitBtn.disabled = true;
        setMessage('전송 중입니다...', 'ok');

        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          setMessage('정상적으로 제출되었습니다.', 'ok');
          form.reset();
        } else {
          setMessage('제출 실패: ' + (result.message || '알 수 없는 오류'), 'error');
        }
      } catch (error) {
        setMessage('요청 중 오류가 발생했습니다. Apps Script 배포 설정과 CORS 응답을 확인하세요.\n' + error, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
	
	
  </script>
</body>
</html>
