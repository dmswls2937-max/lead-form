<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신청 폼</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 20px;
    }
    h2 {
      margin-bottom: 20px;
    }
    .field {
      margin-bottom: 12px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
    }
    #doneMsg {
      display: none;
      margin-top: 16px;
      color: green;
      font-weight: bold;
    }
    iframe {
      display: none;
    }
  </style>
</head>
<body>
  <h2>신청 폼</h2>

  <form
    id="leadForm"
    action="https://script.google.com/macros/s/AKfycbxpNbH30_n7TRa8mGBGREYGsmht3H7IUGqTCKAFR2Tai1O6V4fk6XiXbmxnsIW8F6xG/exec"
    method="POST"
    target="hidden_iframe"
  >
    <div class="field">
      <input type="text" name="name" placeholder="이름" required />
    </div>

    <div class="field">
      <input type="text" name="phone" placeholder="전화번호" required />
    </div>

    <div class="field">
      <select name="gender" required>
        <option value="">성별 선택</option>
        <option value="남">남</option>
        <option value="여">여</option>
      </select>
    </div>

    <button type="submit">전송</button>
  </form>

  <iframe name="hidden_iframe"></iframe>

  <div id="doneMsg">전송이 완료되었습니다.</div>

  <script>
    const form = document.getElementById('leadForm');
    const doneMsg = document.getElementById('doneMsg');

    form.addEventListener('submit', () => {
      setTimeout(() => {
        form.reset();
        doneMsg.style.display = 'block';
      }, 1000);
    });
  </script>
</body>
</html>
